<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>Project Tracker</h1>
      <p class="subtitle">Manage your work tasks and projects efficiently</p>
    </header>

    <form id="taskForm" class="task-form">
      <input id="taskTitle" type="text" placeholder="Task title" required class="input-field" />
      <textarea id="taskDescription" rows="3" placeholder="Description (optional)" class="input-field"></textarea>
      <button type="submit" class="btn btn-primary">Add Task</button>
    </form>

    <div class="status-row">
      <span id="taskCount">0 tasks</span>
      <span id="appStatus">Offline</span>
    </div>

    <section id="tasksList" class="tasks-list">
      <div class="empty-state">
        <p>Start adding tasks to track your projects.</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
