<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Task Manager</h1>
      <p class="subtitle">Modern productivity dashboard</p>
      <div class="meta-bar">
        <span id="appStatus" class="status-pill">Offline</span>
        <span id="taskStats" class="stats-pill">Total: 0 | Pending: 0 | In-progress: 0 | Completed: 0</span>
      </div>
    </header>

    <section class="add-task-section">
      <h2>Create New Task</h2>
      <form id="taskForm" class="task-form">
        <div class="row">
          <input
            type="text"
            id="taskTitle"
            placeholder="Task title"
            required
            class="input-field"
          >
          <select id="taskStatus" class="input-field input-select" aria-label="Status">
            <option value="pending" selected>Pending</option>
            <option value="in-progress">In progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <textarea
          id="taskDescription"
          placeholder="Description (optional)"
          rows="3"
          class="input-field"
        ></textarea>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Add Task</button>
          <button id="clearFilter" type="button" class="btn btn-secondary">Reset Filters</button>
        </div>
      </form>
    </section>

    <section class="controls-section">
      <div class="filter-row">
        <input id="searchInput" type="search" placeholder="Search tasks" class="input-field" />
        <select id="statusFilter" class="input-field input-select">
          <option value="all">All</option>
          <option value="pending">Pending</option>
          <option value="in-progress">In progress</option>
          <option value="completed">Completed</option>
        </select>
        <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
      </div>
    </section>

    <section class="tasks-section">
      <div class="section-header">
        <h2>Your Tasks</h2>
        <div id="taskCount" class="task-count">0 tasks</div>
      </div>
      <div id="tasksList" class="tasks-list">
        <div class="loading">Loading tasks...</div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
